<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidRoute | Global Express</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f7; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 95%; padding: 12px; background: #00274c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .status-box { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; }
        #loader { display: none; color: #00274c; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>

    <h2 onclick="handleAdminLogin()">RapidRoute Global</h2>
    
    <div id="searchArea" class="card">
        <h3>Track Your Shipment</h3>
        <input type="text" id="trackInput" placeholder="Enter Tracking ID (e.g. RR-123456)">
        <button onclick="globalSearch()">TRACK PACKAGE</button>
        <div id="loader">Connecting to Global Server...</div>
    </div>

    <div id="resultArea" class="card hidden">
        <div class="status-box">
            <p><strong>ID:</strong> <span id="resID"></span></p>
            <p><strong>Status:</strong> <span id="resStatus" style="color: blue;"></span></p>
            <p><strong>Location:</strong> <span id="resLoc"></span></p>
            <p><strong>Weight:</strong> <span id="resWeight"></span></p>
        </div>
        <button onclick="location.reload()" style="background:#666; margin-top:10px;">New Search</button>
    </div>

    <div id="adminPanel" class="card hidden" style="border: 2px solid red;">
        <h3>Admin Console</h3>
        <input type="text" id="newID" placeholder="Tracking ID">
        <button onclick="generateRandomID()" style="background:#444; margin-bottom:10px;">Generate ID</button>
        <select id="newStatus">
            <option>Pending</option>
            <option>In Transit</option>
            <option>Clearance Delay</option>
            <option>Delivered</option>
        </select>
        <input type="text" id="newLoc" placeholder="Current City/Port">
        <input type="text" id="newWeight" placeholder="Weight (e.g. 5.0 lbs)">
        <button onclick="saveToCloud()" style="background: green;">SAVE TO GLOBAL DATABASE</button>
        <hr>
        <div id="adminList"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // YOUR UNIQUE KEYS
        const firebaseConfig = {
            apiKey: "AIzaSyCYyMXhRCHTXjRMgG9o4-yihKh7QuQ62Xg",
            authDomain: "rapidroute-global-express.firebaseapp.com",
            databaseURL: "https://rapidroute-global-express-default-rtdb.firebaseio.com",
            projectId: "rapidroute-global-express",
            storageBucket: "rapidroute-global-express.appspot.com",
            appId: "1:47351047355:web:a94209ba83f0e116bb59e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. SEARCH FUNCTION (Works on all phones)
        function globalSearch() {
            const id = document.getElementById('trackInput').value.trim().toUpperCase();
            if(!id) return;

            document.getElementById('loader').style.display = 'block';

            db.ref('parcels/' + id).once('value').then((snapshot) => {
                document.getElementById('loader').style.display = 'none';
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('searchArea').classList.add('hidden');
                    document.getElementById('resultArea').classList.remove('hidden');
                    
                    document.getElementById('resID').innerText = id;
                    document.getElementById('resStatus').innerText = data.status;
                    document.getElementById('resLoc').innerText = data.location;
                    document.getElementById('resWeight').innerText = data.weight;
                } else {
                    alert("Tracking ID not found in global records.");
                }
            });
        }

        // 2. ADMIN LOGIN
        function handleAdminLogin() {
            const pass = prompt("Access Key:");
            if(pass === "FlawFlaw100$") {
                document.getElementById('adminPanel').classList.remove('hidden');
                refreshAdminList();
            }
        }

        function generateRandomID() {
            document.getElementById('newID').value = "RR-" + Math.floor(Math.random() * 900000 + 100000);
        }

        // 3. SAVE TO CLOUD (This makes it global)
        function saveToCloud() {
            const id = document.getElementById('newID').value.trim().toUpperCase();
            const data = {
                status: document.getElementById('newStatus').value,
                location: document.getElementById('newLoc').value,
                weight: document.getElementById('newWeight').value || "Unknown"
            };

            db.ref('parcels/' + id).set(data).then(() => {
                alert("Package " + id + " is now LIVE for all users.");
                refreshAdminList();
            });
        }

        function refreshAdminList() {
            const list = document.getElementById('adminList');
            db.ref('parcels').once('value').then((snapshot) => {
                list.innerHTML = "<h4>Active Cloud Shipments:</h4>";
                snapshot.forEach((child) => {
                    list.innerHTML += `<div style="font-size:12px; margin-bottom:5px;">
                        ${child.key} - <span style="color:red" onclick="deleteGlobal('${child.key}')">[DELETE]</span>
                    </div>`;
                });
            });
        }

        function deleteGlobal(id) {
            if(confirm("Delete globally?")) {
                db.ref('parcels/' + id).remove().then(() => refreshAdminList());
            }
        }
    </script>
</body>
</html>
